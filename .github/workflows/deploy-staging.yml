name: CI/CD — Staging Deploy

on:
  push:
    branches:
      - staging

concurrency:
  group: deploy-staging
  cancel-in-progress: true

jobs:

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 1: Lint (ESLint + Prettier)
  # ─────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint & Format check
    runs-on: ubuntu-latest

    if: github.event_name == 'push'

    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        id: eslint
        run: |
          if npm run lint --if-present 2>/dev/null; then
            echo "eslint_status=passed" >> $GITHUB_OUTPUT
          else
            echo "eslint_status=failed" >> $GITHUB_OUTPUT
            echo "::warning title=ESLint::ESLint encontro problemas. Revisa los errores arriba."
          fi
        continue-on-error: true

      - name: Run Prettier check
        id: prettier
        run: |
          if npm run format:check --if-present 2>/dev/null; then
            echo "prettier_status=passed" >> $GITHUB_OUTPUT
          else
            echo "prettier_status=failed" >> $GITHUB_OUTPUT
            echo "::warning title=Prettier::Prettier encontro archivos sin formatear."
          fi
        continue-on-error: true

      - name: Lint summary
        run: |
          echo "## Lint Results (Staging)" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          if [ "${{ steps.eslint.outputs.eslint_status }}" = "passed" ]; then
            echo "| ESLint | Paso |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.eslint.outputs.eslint_status }}" = "failed" ]; then
            echo "| ESLint | Con advertencias |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| ESLint | No configurado |" >> $GITHUB_STEP_SUMMARY
          fi

          if [ "${{ steps.prettier.outputs.prettier_status }}" = "passed" ]; then
            echo "| Prettier | Paso |" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.prettier.outputs.prettier_status }}" = "failed" ]; then
            echo "| Prettier | Con advertencias |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Prettier | No configurado |" >> $GITHUB_STEP_SUMMARY
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 2: Tests
  # ─────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    if: github.event_name == 'push'

    continue-on-error: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        id: tests
        run: |
          if npm run test:ci --if-present 2>/dev/null; then
            echo "test_status=passed" >> $GITHUB_OUTPUT
          elif npm run test -- --run --reporter=verbose 2>/dev/null; then
            echo "test_status=passed" >> $GITHUB_OUTPUT
          else
            echo "test_status=failed" >> $GITHUB_OUTPUT
            echo "::warning title=Tests::Algunos tests fallaron. El deploy continua pero revisa los errores."
          fi
        continue-on-error: true
        env:
          CI: true

      - name: Test summary
        run: |
          echo "## Test Results (Staging)" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.tests.outputs.test_status }}" = "passed" ]; then
            echo "Todos los tests pasaron." >> $GITHUB_STEP_SUMMARY
          elif [ "${{ steps.tests.outputs.test_status }}" = "failed" ]; then
            echo "Algunos tests fallaron. El deploy continua de todas formas." >> $GITHUB_STEP_SUMMARY
          else
            echo "No se encontraron tests configurados." >> $GITHUB_STEP_SUMMARY
          fi

  # ─────────────────────────────────────────────────────────────────────────────
  # JOB 3: Build + Deploy a S3 Staging + Invalidar CloudFront
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Build & Deploy (Staging)
    runs-on: ubuntu-latest
    needs: [lint, test]

    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Build de staging con Vite
      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production
          VITE_API_URL: https://api-staging.devmarcoestrada.com/

      # Generar robots.txt restrictivo para staging (bloquea indexacion)
      - name: Generate restrictive robots.txt for staging
        run: |
          cat > dist/robots.txt << 'ROBOTS'
          User-agent: *
          Disallow: /
          ROBOTS

      # Configurar credenciales AWS
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      # Assets (JS/CSS/imagenes) — cache 1 ano
      - name: Deploy assets to S3 (cache 1 year)
        run: |
          aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_STAGING }} \
            --delete \
            --exact-timestamps \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.json" \
            --exclude "*.txt"

      # index.html siempre sin cache
      - name: Deploy index.html to S3 (no cache)
        run: |
          aws s3 cp dist/index.html s3://${{ secrets.S3_BUCKET_STAGING }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"

      # robots.txt y sitemap.xml sin cache
      - name: Deploy meta files to S3 (no cache)
        run: |
          for file in robots.txt sitemap.xml; do
            if [ -f "dist/$file" ]; then
              aws s3 cp "dist/$file" "s3://${{ secrets.S3_BUCKET_STAGING }}/$file" \
                --cache-control "no-cache, no-store, must-revalidate"
              echo "Uploaded: $file"
            fi
          done

      # Archivos JSON sin cache
      - name: Deploy JSON files to S3 (no cache)
        run: |
          if find dist -name "*.json" | grep -q .; then
            aws s3 sync dist/ s3://${{ secrets.S3_BUCKET_STAGING }} \
              --exclude "*" \
              --include "*.json" \
              --cache-control "no-cache, no-store, must-revalidate"
          fi

      # Invalidar cache de CloudFront staging
      - name: Invalidate CloudFront cache
        run: |
          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID_STAGING }} \
            --paths "/*" \
            --query 'Invalidation.Id' \
            --output text)
          echo "Invalidation ID: $INVALIDATION_ID"
          echo "invalidation_id=$INVALIDATION_ID" >> $GITHUB_ENV

      # Resumen final
      - name: Deployment summary
        run: |
          echo "## Deploy Staging completado" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Detalle |" >> $GITHUB_STEP_SUMMARY
          echo "|------|---------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ambiente | **Staging** |" >> $GITHUB_STEP_SUMMARY
          echo "| Bucket | ${{ secrets.S3_BUCKET_STAGING }} |" >> $GITHUB_STEP_SUMMARY
          echo "| CloudFront Invalidation | ${{ env.invalidation_id }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Disparado por | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| robots.txt | Disallow: / (no indexable) |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.lint.result }}" = "failure" ]; then
            echo "Advertencia: Lint tuvo problemas, revisa el job Lint." >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ needs.test.result }}" = "failure" ]; then
            echo "Advertencia: Tests fallaron, revisa el job Tests." >> $GITHUB_STEP_SUMMARY
          fi
